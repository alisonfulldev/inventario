<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#14532d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Inventário — Sistemas Embarcados</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ═══ TOPBAR ══════════════════════════════════════════════ -->
<header class="topbar">
  <div class="topbar__brand">
    <span class="brand-icon">🌾</span>
    <span>Embarcados</span>
  </div>
  <div class="topbar__actions">
    <span class="topbar__user" id="user-name"></span>
    <a href="admin.html" class="btn btn--ghost btn--sm" id="admin-link" style="display:none">⚙</a>
    <button class="btn btn--ghost btn--sm" id="btn-logout">Sair</button>
  </div>
</header>

<!-- ═══ FORMULÁRIO ══════════════════════════════════════════ -->
<main class="container">
  <form id="form-inventario" novalidate>

    <!-- ── IDENTIFICAÇÃO ──────────────────────────────────── -->
    <div class="simple-card">
      <p class="simple-card__title">🚜 Identificação</p>
      <div class="id-row">
        <div class="form-group" style="margin:0">
          <label for="matricula">Matrícula <span class="required">*</span></label>
          <input type="text" id="matricula" placeholder="Ex: 12345"
                 inputmode="numeric" autocomplete="off">
        </div>
        <div class="form-group" style="margin:0">
          <label for="frota">Frota <span class="required">*</span></label>
          <input type="text" id="frota" placeholder="Ex: F-001" autocomplete="off">
        </div>
      </div>
    </div>

    <!-- ── STATUS ─────────────────────────────────────────── -->
    <div class="simple-card">
      <p class="simple-card__title">📋 Status <span class="required">*</span></p>
      <div class="status-row">
        <label class="status-btn" id="lbl-instalado">
          <input type="radio" name="status" value="instalados">
          <span class="status-emoji">✅</span>
          <span class="status-label">Instalados</span>
        </label>
        <label class="status-btn" id="lbl-retirado">
          <input type="radio" name="status" value="retirados">
          <span class="status-emoji">🔧</span>
          <span class="status-label">Retirados</span>
        </label>
      </div>
    </div>

    <!-- ── CABEÇALHO DE FOTOS + PROGRESSO ─────────────────── -->
    <div class="photos-header">
      <div class="photos-header__top">
        <span class="photos-header__title">📷 Fotos</span>
        <span class="photos-header__hint">série opcional · ilimitadas</span>
      </div>
      <div class="photo-progress">
        <div class="photo-progress__bar">
          <div class="photo-progress__fill" id="progress-fill"></div>
        </div>
        <span class="photo-progress__text" id="progress-text">0 / 8</span>
      </div>
    </div>

    <!-- ══ BORDO ══ -->
    <div class="equip-group" id="group-bordo">
      <div class="equip-group__header">
        <span class="equip-group__icon">📱</span>
        <span class="equip-group__name">Bordo</span>
        <span class="equip-group__count" id="count-bordo">0 / 3</span>
      </div>
      <div class="items-grid">

        <div class="item-card" id="card-bordo">
          <div class="item-card__header">
            <span class="item-card__icon">📱</span>
            <span class="item-card__name">Unidade Bordo</span>
            <span class="item-card__badge" id="badge-bordo">0</span>
          </div>
          <div class="item-card__loading" id="loading-bordo"><span class="spinner spinner--green"></span></div>
          <div class="item-card__thumbs" id="thumbs-bordo">
            <label class="thumb-add" for="foto-bordo">
              <span class="thumb-add__icon">📷</span>
              <span class="thumb-add__text">Foto</span>
            </label>
          </div>
          <input type="file" class="item-file" id="foto-bordo" accept="image/*" data-type="bordo" data-group="bordo">
          <div class="item-card__fields">
            <input type="text" id="serie-bordo" placeholder="Nº série bordo" autocomplete="off">
          </div>
        </div>

        <div class="item-card" id="card-tela">
          <div class="item-card__header">
            <span class="item-card__icon">🖥</span>
            <span class="item-card__name">Tela</span>
            <span class="item-card__badge" id="badge-tela">0</span>
          </div>
          <div class="item-card__loading" id="loading-tela"><span class="spinner spinner--green"></span></div>
          <div class="item-card__thumbs" id="thumbs-tela">
            <label class="thumb-add" for="foto-tela">
              <span class="thumb-add__icon">📷</span>
              <span class="thumb-add__text">Foto</span>
            </label>
          </div>
          <input type="file" class="item-file" id="foto-tela" accept="image/*" data-type="tela" data-group="bordo">
          <div class="item-card__fields">
            <input type="text" id="serie-tela" placeholder="Nº série tela" autocomplete="off">
          </div>
        </div>

        <div class="item-card" id="card-chip-bordo">
          <div class="item-card__header">
            <span class="item-card__icon">📶</span>
            <span class="item-card__name">Chip Bordo</span>
            <span class="item-card__badge" id="badge-chip-bordo">0</span>
          </div>
          <div class="item-card__loading" id="loading-chip-bordo"><span class="spinner spinner--green"></span></div>
          <div class="item-card__thumbs" id="thumbs-chip-bordo">
            <label class="thumb-add" for="foto-chip-bordo">
              <span class="thumb-add__icon">📷</span>
              <span class="thumb-add__text">Foto</span>
            </label>
          </div>
          <input type="file" class="item-file" id="foto-chip-bordo" accept="image/*" data-type="chip-bordo" data-group="bordo">
          <div class="item-card__fields">
            <input type="text" id="chip-bordo" placeholder="Número do chip" inputmode="numeric" autocomplete="off">
          </div>
        </div>

      </div>
    </div><!-- /group bordo -->

    <!-- ══ RÁDIO ══ -->
    <div class="equip-group" id="group-radio">
      <div class="equip-group__header">
        <span class="equip-group__icon">📻</span>
        <span class="equip-group__name">Rádio</span>
        <span class="equip-group__count" id="count-radio">0 / 1</span>
      </div>
      <div class="items-grid">

        <div class="item-card" id="card-radio">
          <div class="item-card__header">
            <span class="item-card__icon">📻</span>
            <span class="item-card__name">Rádio</span>
            <span class="item-card__badge" id="badge-radio">0</span>
          </div>
          <div class="item-card__loading" id="loading-radio"><span class="spinner spinner--green"></span></div>
          <div class="item-card__thumbs" id="thumbs-radio">
            <label class="thumb-add" for="foto-radio">
              <span class="thumb-add__icon">📷</span>
              <span class="thumb-add__text">Foto</span>
            </label>
          </div>
          <input type="file" class="item-file" id="foto-radio" accept="image/*" data-type="radio" data-group="radio">
          <div class="item-card__fields">
            <input type="text" id="serie-radio" placeholder="Nº série rádio" autocomplete="off">
            <input type="text" id="id-radio"    placeholder="ID rádio"        autocomplete="off">
          </div>
        </div>

      </div>
    </div><!-- /group radio -->

    <!-- ══ PILOTO AUTOMÁTICO ══ -->
    <div class="equip-group" id="group-piloto">
      <div class="equip-group__header">
        <span class="equip-group__icon">🎯</span>
        <span class="equip-group__name">Piloto Automático</span>
        <span class="equip-group__count" id="count-piloto">0 / 3</span>
      </div>
      <div class="items-grid">

        <div class="item-card" id="card-monitor">
          <div class="item-card__header">
            <span class="item-card__icon">🖥</span>
            <span class="item-card__name">Monitor</span>
            <span class="item-card__badge" id="badge-monitor">0</span>
          </div>
          <div class="item-card__loading" id="loading-monitor"><span class="spinner spinner--green"></span></div>
          <div class="item-card__thumbs" id="thumbs-monitor">
            <label class="thumb-add" for="foto-monitor">
              <span class="thumb-add__icon">📷</span>
              <span class="thumb-add__text">Foto</span>
            </label>
          </div>
          <input type="file" class="item-file" id="foto-monitor" accept="image/*" data-type="monitor" data-group="piloto">
          <div class="item-card__fields">
            <input type="text" id="serie-monitor" placeholder="Nº série monitor" autocomplete="off">
          </div>
        </div>

        <div class="item-card" id="card-receptor">
          <div class="item-card__header">
            <span class="item-card__icon">📡</span>
            <span class="item-card__name">Receptor</span>
            <span class="item-card__badge" id="badge-receptor">0</span>
          </div>
          <div class="item-card__loading" id="loading-receptor"><span class="spinner spinner--green"></span></div>
          <div class="item-card__thumbs" id="thumbs-receptor">
            <label class="thumb-add" for="foto-receptor">
              <span class="thumb-add__icon">📷</span>
              <span class="thumb-add__text">Foto</span>
            </label>
          </div>
          <input type="file" class="item-file" id="foto-receptor" accept="image/*" data-type="receptor" data-group="piloto">
          <div class="item-card__fields">
            <input type="text" id="serie-receptor" placeholder="Nº série receptor" autocomplete="off">
          </div>
        </div>

        <div class="item-card" id="card-nave">
          <div class="item-card__header">
            <span class="item-card__icon">🛰</span>
            <span class="item-card__name">Nave</span>
            <span class="item-card__badge" id="badge-nave">0</span>
          </div>
          <div class="item-card__loading" id="loading-nave"><span class="spinner spinner--green"></span></div>
          <div class="item-card__thumbs" id="thumbs-nave">
            <label class="thumb-add" for="foto-nave">
              <span class="thumb-add__icon">📷</span>
              <span class="thumb-add__text">Foto</span>
            </label>
          </div>
          <input type="file" class="item-file" id="foto-nave" accept="image/*" data-type="nave" data-group="piloto">
          <div class="item-card__fields">
            <input type="text" id="serie-nave"  placeholder="Nº série nave"  autocomplete="off">
            <input type="text" id="serie-tm200" placeholder="Nº série TM200" autocomplete="off">
            <input type="text" id="serie-ag850" placeholder="Nº série AG850" autocomplete="off">
          </div>
        </div>

      </div>
    </div><!-- /group piloto -->

    <!-- ══ AUTOMAÇÃO ══ -->
    <div class="equip-group" id="group-automacao">
      <div class="equip-group__header">
        <span class="equip-group__icon">⚙️</span>
        <span class="equip-group__name">Automação</span>
        <span class="equip-group__count" id="count-automacao">0 / 1</span>
      </div>
      <div class="items-grid">

        <div class="item-card" id="card-automacao">
          <div class="item-card__header">
            <span class="item-card__icon">⚙️</span>
            <span class="item-card__name">Automação</span>
            <span class="item-card__badge" id="badge-automacao">0</span>
          </div>
          <div class="item-card__loading" id="loading-automacao"><span class="spinner spinner--green"></span></div>
          <div class="item-card__thumbs" id="thumbs-automacao">
            <label class="thumb-add" for="foto-automacao">
              <span class="thumb-add__icon">📷</span>
              <span class="thumb-add__text">Foto</span>
            </label>
          </div>
          <input type="file" class="item-file" id="foto-automacao" accept="image/*" data-type="automacao" data-group="automacao">
          <div class="item-card__fields">
            <input type="text" id="serie-automacao" placeholder="Nº série automação" autocomplete="off">
          </div>
        </div>

      </div>
    </div><!-- /group automacao -->

    <!-- ── OBSERVAÇÃO ──────────────────────────────────────── -->
    <div class="simple-card">
      <p class="simple-card__title">📝 Observação
        <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:.875rem;color:var(--text-muted)">&nbsp;(opcional)</span>
      </p>
      <textarea id="observacao" placeholder="Alguma observação relevante…" rows="3"></textarea>
    </div>

    <div class="form-spacer"></div>
  </form>
</main>

<!-- ═══ SUBMIT FIXO ══════════════════════════════════════════ -->
<div class="submit-bar">
  <button type="submit" form="form-inventario" class="btn btn--primary" id="btn-submit">
    <span>📤</span> Enviar Inventário
  </button>
</div>

<script src="js/firebase-demo.js"></script>
<script src="js/compress.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
</body>
</html>
